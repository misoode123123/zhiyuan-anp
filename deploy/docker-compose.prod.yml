# 智源 ANP 生产编排（CentOS + Docker，MVP 用 SQLite 容器卷；全 block 格式避 flow colon）
services:
  agent-runtime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    env_file: .env.prod
    expose:
      - "8001"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    env_file: .env.prod
    environment:
      DATABASE_URL: "sqlite:///data/anp.db"
      AGENT_RUNTIME_URL: "http://agent-runtime:8001"
      BACKEND_HTTP_ADDR: ":8080"
      OPENCODE_CONFIG: "/app/opencode.json"
    volumes:
      - ../data:/data
      - ../platform/opencode.json:/app/opencode.json
      - /var/run/docker.sock:/var/run/docker.sock   # 应用部署引擎：后端控制宿主 Docker
      - ../data/repos:/data/repos                   # 产出应用源码（docker build 上下文）
    depends_on:
      - agent-runtime
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"
    depends_on:
      - backend
      - agent-runtime
      - frontend
    restart: unless-stopped
