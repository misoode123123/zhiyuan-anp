# 智源 ANP 反向代理
server {
    listen 80;
    server_name _;
    client_max_body_size 20m;   # 多模态图片上传

    # Docker 内嵌 DNS：配合变量化 upstream，定期重解析，
    # 避免后端/前端容器重建后 nginx 缓存旧 IP 导致 502。
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 前端
    location / {
        set $fe frontend;
        proxy_pass http://$fe:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 后端 API
    location /api/ {
        set $be backend;
        proxy_pass http://$be:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Project-Space-Id $http_x_project_space_id;
        proxy_set_header X-User $http_x_user;
        proxy_set_header X-Trace-Id $http_x_trace_id;
    }

    # AI 运行时（前端多模态/对话直连）
    location /agent/ {
        set $ar agent-runtime;
        proxy_pass http://$ar:8001/;
        proxy_set_header Host $host;
    }
}
