basePath: /api/v1
definitions:
  internal_appdeploy.createBody:
    properties:
      internal_port:
        description: 可选；buildpack 检测或默认 8080
        type: integer
      name:
        type: string
      repo_dir:
        description: 可选；空=平台托管 git 仓库 /data/repos/<name>
        type: string
    required:
    - name
    type: object
  internal_attendance.submitRequest:
    properties:
      end_time:
        description: RFC3339
        type: string
      reason:
        type: string
      start_time:
        description: RFC3339
        type: string
      status:
        description: rest/overtime/leave
        type: string
      supervisor_id:
        description: 直接上级，提交后转其审批
        type: string
    required:
    - end_time
    - start_time
    - status
    - supervisor_id
    type: object
  internal_auth.loginBody:
    properties:
      name:
        type: string
      password:
        type: string
    required:
    - name
    - password
    type: object
  internal_capability.apiKeyBody:
    properties:
      allowed_skills:
        type: string
      app_name:
        type: string
      scope:
        type: string
    required:
    - app_name
    type: object
  internal_capability.domainAgentBody:
    properties:
      code:
        type: string
      composed_skills:
        type: string
      domain:
        type: string
      name:
        type: string
      status:
        type: string
    required:
    - code
    - name
    type: object
  internal_capability.invokeBody:
    properties:
      input:
        type: string
      render_hint:
        description: card/form/chart/text
        type: string
      skill_code:
        type: string
    required:
    - input
    - skill_code
    type: object
  internal_capability.skillBody:
    properties:
      category:
        type: string
      code:
        type: string
      data_access_scope:
        type: string
      description:
        type: string
      is_public:
        type: boolean
      name:
        type: string
      prompt_template:
        type: string
      risk_level:
        type: string
      version:
        type: string
    required:
    - code
    - name
    type: object
  internal_config.setRequest:
    properties:
      category:
        type: string
      description:
        type: string
      value:
        type: string
    required:
    - value
    type: object
  internal_conversation.asrRequest:
    properties:
      audio:
        type: string
      filename:
        type: string
    required:
    - audio
    type: object
  internal_conversation.commitRequest:
    properties:
      acceptance_criteria:
        items:
          type: string
        type: array
      title:
        type: string
      user_story:
        type: string
    required:
    - acceptance_criteria
    - title
    - user_story
    type: object
  internal_conversation.messageRequest:
    properties:
      images:
        items:
          type: string
        type: array
      text:
        type: string
    required:
    - text
    type: object
  internal_dev.codeRequest:
    properties:
      model:
        type: string
      prompt:
        type: string
      repo_dir:
        type: string
    required:
    - prompt
    - repo_dir
    type: object
  internal_ops.alertBody:
    properties:
      description:
        type: string
      severity:
        type: string
      source:
        type: string
      title:
        type: string
    required:
    - severity
    - title
    type: object
  internal_ops.sopBody:
    properties:
      category:
        type: string
      code:
        type: string
      description:
        type: string
      name:
        type: string
      requires_approval:
        type: boolean
      risk_level:
        type: string
      rollback:
        type: string
      status:
        type: string
      steps:
        type: string
    required:
    - code
    - name
    type: object
  internal_release.createRequest:
    properties:
      change_id:
        type: string
    required:
    - change_id
    type: object
  internal_requirement.createRequest:
    properties:
      application_id:
        description: 可选：归属应用
        type: string
      description:
        type: string
      images:
        description: data URL 或 http URL
        items:
          type: string
        type: array
    required:
    - description
    type: object
  internal_requirement.dispatchRequest:
    properties:
      model:
        type: string
      repo_dir:
        description: 可选；空=用需求归属应用的托管仓库
        type: string
    type: object
  internal_rule.checkRequest:
    properties:
      content:
        type: string
      field:
        type: string
      scope:
        type: string
    type: object
  internal_rule.createRequest:
    properties:
      action:
        type: string
      category:
        type: string
      condition:
        type: string
      condition_field:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      scope:
        type: string
      type:
        type: string
    required:
    - condition
    - name
    type: object
  internal_rule.setEnabledRequest:
    properties:
      enabled:
        type: boolean
    type: object
  internal_rule.updateRequest:
    properties:
      action:
        type: string
      category:
        type: string
      condition:
        type: string
      condition_field:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      scope:
        type: string
      type:
        type: string
    required:
    - condition
    - name
    type: object
  internal_security.dcBody:
    properties:
      data_type:
        type: string
      field_name:
        type: string
      masking_strategy:
        type: string
      sensitivity_level:
        type: string
      table_ref:
        type: string
    required:
    - field_name
    - table_ref
    type: object
  internal_security.scanBody:
    properties:
      content:
        type: string
      scan_type:
        description: secret/sast/prompt/full（空=full）
        type: string
    required:
    - content
    type: object
  internal_standard.createBody:
    properties:
      category:
        type: string
      content:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      priority:
        type: integer
    required:
    - content
    - name
    type: object
  internal_standard.setEnabledBody:
    properties:
      enabled:
        type: boolean
    type: object
  internal_standard.updateBody:
    properties:
      category:
        type: string
      content:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      priority:
        type: integer
    required:
    - content
    - name
    type: object
  internal_workspace.CreateProjectInput:
    properties:
      name:
        maxLength: 128
        minLength: 1
        type: string
      slug:
        maxLength: 64
        minLength: 1
        type: string
    required:
    - name
    - slug
    type: object
  internal_workspace.CreateProjectSpaceInput:
    properties:
      name:
        maxLength: 128
        minLength: 1
        type: string
      slug:
        maxLength: 64
        minLength: 1
        type: string
    required:
    - name
    - slug
    type: object
info:
  contact: {}
  description: 企业 AI 原生研发平台后端（AI 驱动 需求→研发→测试→审批→发布 全流程）
  title: 智源 ANP 平台 API
  version: "1.0"
paths:
  /asr:
    post:
      consumes:
      - application/json
      parameters:
      - description: 音频(base64 audio+filename)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_conversation.asrRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 识别文本 {text}
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 识别失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 语音识别（ASR）
      tags:
      - conversation
  /attendance/{id}/approve:
    post:
      parameters:
      - description: 考勤记录ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 审批后的考勤记录
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务端错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 审批通过考勤
      tags:
      - attendance
  /attendance/{id}/reject:
    post:
      parameters:
      - description: 考勤记录ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 驳回后的考勤记录
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务端错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 驳回考勤
      tags:
      - attendance
  /attendance/inbox:
    get:
      parameters:
      - description: 状态过滤(pending/approved/rejected)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 待审批考勤列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务端错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 待我审批的考勤收件箱
      tags:
      - attendance
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录凭证(name+password)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.loginBody'
      produces:
      - application/json
      responses:
        "200":
          description: code/message/data{token,user}
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 凭证错误
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 认证
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: logged_out
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 登出
      tags:
      - 认证
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: user
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 当前登录用户
      tags:
      - 认证
  /capabilities/invoke:
    post:
      consumes:
      - application/json
      parameters:
      - description: APIKey（与 Bearer 二选一）
        in: header
        name: X-Api-Key
        type: string
      - description: Bearer sk_anp_xxx
        in: header
        name: Authorization
        type: string
      - description: 调用入参(skill_code+input)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_capability.invokeBody'
      produces:
      - application/json
      responses:
        "200":
          description: result/api_key_id/caller_app
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: APIKey 无效
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 无权调用
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 技能不存在或不可用
          schema:
            additionalProperties: true
            type: object
        "502":
          description: 网关/上游错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 统一技能调用入口
      tags:
      - capability
  /capabilities/skills:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 已上架公共技能列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务端错误
          schema:
            additionalProperties: true
            type: object
      summary: 公共技能目录
      tags:
      - capability
  /capabilities/skills/{sid}:
    get:
      parameters:
      - description: 技能ID
        in: path
        name: sid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 技能详情
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 技能不存在
          schema:
            additionalProperties: true
            type: object
      summary: 公共技能详情
      tags:
      - capability
  /changes:
    get:
      parameters:
      - description: 状态过滤(pending|approved|rejected)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 变更列表
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 列出变更
      tags:
      - change
  /changes/{id}/approve:
    post:
      parameters:
      - description: 变更ID
        in: path
        name: id
        required: true
        type: string
      - description: 审批人(默认 user)
        in: header
        name: X-User
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: approved
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 非 pending 状态
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 批准变更
      tags:
      - change
  /changes/{id}/reject:
    post:
      parameters:
      - description: 变更ID
        in: path
        name: id
        required: true
        type: string
      - description: 审批人(默认 user)
        in: header
        name: X-User
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: rejected
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 非 pending 状态
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 拒绝变更
      tags:
      - change
  /code:
    post:
      consumes:
      - application/json
      parameters:
      - description: 编码任务(repo_dir+prompt+model)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_dev.codeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: task_id+status=running+note
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 提交失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 异步提交编码任务（立即返回 task_id）
      tags:
      - dev
  /code-tasks/{id}:
    get:
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 任务详情
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 任务不存在
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 查询编码任务状态/产出
      tags:
      - dev
  /config:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 系统配置列表
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 列出全部系统配置
      tags:
      - config
  /config/{key}:
    put:
      consumes:
      - application/json
      parameters:
      - description: 配置键
        in: path
        name: key
        required: true
        type: string
      - description: 配置值(value)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_config.setRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{key,value}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务端错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 新增/更新一条系统配置
      tags:
      - config
  /conversations/{cid}:
    get:
      parameters:
      - description: 会话ID
        in: path
        name: cid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: conversation+messages
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 会话不存在
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取会话详情（含全部消息）
      tags:
      - conversation
  /conversations/{cid}/commit:
    post:
      consumes:
      - application/json
      parameters:
      - description: 会话ID
        in: path
        name: cid
        required: true
        type: string
      - description: 规格(title+user_story+acceptance_criteria)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_conversation.commitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: conversation_id+requirement
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 内部错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 确认入库（生成 requirement）
      tags:
      - conversation
  /conversations/{cid}/generate-spec:
    post:
      parameters:
      - description: 会话ID
        in: path
        name: cid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: spec 草稿
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 内部错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 生成规格草稿（不入库）
      tags:
      - conversation
  /conversations/{cid}/messages:
    post:
      consumes:
      - application/json
      parameters:
      - description: 会话ID
        in: path
        name: cid
        required: true
        type: string
      - description: 消息内容(text+images)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_conversation.messageRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: 'SSE 流：data: {delta}|{error}|{done,message}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 发送消息（SSE 流式回复）
      tags:
      - conversation
  /project-spaces:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 项目空间列表
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 列出项目空间
      tags:
      - workspace
    post:
      consumes:
      - application/json
      parameters:
      - description: 项目空间(name+slug)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_workspace.CreateProjectSpaceInput'
      produces:
      - application/json
      responses:
        "200":
          description: 创建的项目空间
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建项目空间
      tags:
      - workspace
  /project-spaces/{id}:
    get:
      parameters:
      - description: 项目空间ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 项目空间
          schema:
            additionalProperties: true
            type: object
        "404":
          description: project space not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取项目空间详情
      tags:
      - workspace
  /project-spaces/{id}/apps:
    get:
      parameters:
      - description: 项目空间ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 应用列表(含各环境实例)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 内部错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 应用列表
      tags:
      - appdeploy
    post:
      consumes:
      - application/json
      parameters:
      - description: 可选；buildpack 检测或默认 8080
        in: path
        name: internal_port
        type: integer
      - in: path
        name: name
        required: true
        type: string
      - description: 可选；空=平台托管 git 仓库 /data/repos/<name>
        in: path
        name: repo_dir
        type: string
      - description: 应用(name+repo_dir+internal_port)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_appdeploy.createBody'
      produces:
      - application/json
      responses:
        "200":
          description: 创建的应用
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid body
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 仓库初始化/创建失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建应用
      tags:
      - appdeploy
  /project-spaces/{id}/apps/{aid}:
    delete:
      parameters:
      - description: 项目空间ID
        in: path
        name: id
