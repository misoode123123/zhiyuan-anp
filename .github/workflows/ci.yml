# 智源 ANP · CI 门禁（对齐《开发标准与规范》§11 质量门禁）
# 每个 PR / push 到 main 必跑：lint + typecheck + test + 安全扫描。
# 全绿方可合入（分支保护规则后续在 GitHub 仓库设置里配置）。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ Go 后端 ============
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./... --timeout 5m
      - name: go test
        run: go test ./... -coverprofile=coverage.out -covermode=atomic
      - name: 覆盖率门禁 (≥30%)
        run: |
          COV=$(go tool cover -func=coverage.out | awk '/^total/ {gsub("%",""); print $NF}')
          echo "Total coverage: ${COV}%"
          awk "BEGIN {exit !(${COV} >= 30)}" || { echo "::error::后端总覆盖率 ${COV}% 低于门禁 30%"; exit 1; }
      - name: 上传覆盖率
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: platform/backend/coverage.out

  # ============ 前端 ============
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: eslint
        run: pnpm --filter frontend lint
      - name: prettier check
        run: pnpm --filter frontend exec prettier --check .
      - name: tsc typecheck
        run: pnpm --filter frontend exec tsc --noEmit
      - name: vitest
        run: pnpm --filter frontend test
      - name: build
        run: pnpm --filter frontend build

  # ============ Python AI 运行时 ============
  python:
    name: Agent Runtime (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/agent-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - name: ruff lint
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .

  # ============ OpenAPI 契约（生成 + 一致性检查）============
  openapi:
    name: OpenAPI (swag + gen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: install swag
        working-directory: platform/backend
        run: go install github.com/swaggo/swag/cmd/swag@latest
      - name: swag init
        working-directory: platform/backend
        run: swag init -g cmd/server/main.go -o docs --parseDependency --parseInternal
      - run: pnpm install --frozen-lockfile
      - name: swagger2openapi + openapi-typescript
        run: |
          cd platform/frontend
          pnpm exec swagger2openapi ../backend/docs/swagger.json -o ../backend/docs/openapi.json
          pnpm exec openapi-typescript ../backend/docs/openapi.json -o lib/api-types.ts
      - name: 契约一致性（生成的须与提交一致，否则说明改了 handler 没 regen）
        run: git diff --exit-code -- platform/backend/docs platform/frontend/lib/api-types.ts

  # ============ 安全扫描（密钥泄漏）============
  security:
    name: Security (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
