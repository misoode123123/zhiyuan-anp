# 智源 ANP 平台本地编排（M0）
# 注：本机暂未安装 Docker；装好 Docker Desktop 后执行 `docker compose up -d` 一键起依赖。
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: anp
      POSTGRES_PASSWORD: anp
      POSTGRES_DB: anp
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

volumes:
  pgdata:
  miniodata:
