# 智源 ANP 平台本地依赖编排（PostgreSQL+pgvector / redis / minio）
# 起 PG: docker compose up -d postgres
# 后端连 PG: DATABASE_URL=postgres://anp:anp@localhost:5432/anp bash scripts/dev.sh
# （本机无 Docker 时，可用 .28 开发库 deploy_pg_dev：DATABASE_URL=postgres://anp:anp_dev_pwd@10.10.0.28:5432/anp_dev）
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: anp
      POSTGRES_PASSWORD: anp
      POSTGRES_DB: anp
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

volumes:
  pgdata:
  miniodata:
